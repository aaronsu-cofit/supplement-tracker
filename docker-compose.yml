version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: vitera_postgres
    environment:
      POSTGRES_USER: vitera_user
      POSTGRES_PASSWORD: vitera_pass
      POSTGRES_DB: vitera_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitera_user -d vitera_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vitera_network

networks:
  vitera_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
